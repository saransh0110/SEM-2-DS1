<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Salary Management System </title>
    <link rel="stylesheet" href="exp5.css">
</head>
<body>
    <div class="container">
        <header>EMPLOYEE MANAGEMENT SYSTEM</header>
        <input type="text" id="name" placeholder="Employee Name">
        <input type="text" id="empId" placeholder="Employee ID">
        <input type="number" id="salary" placeholder="Salary">
        <input type="text" id="dept" placeholder="Department">

        <button onclick="addEmployee()">Add Employee</button>
        <hr>
        <button onclick="displayEmployees()">Display All Employees</button>
        <button onclick="filterSalary()">Salary > 50000</button>
        <button onclick="totalSalary()">Total Salary</button>
        <button onclick="averageSalary()">Average Salary</button>
        <button onclick="countDepartment()">Count Employees of same Department</button>

        <div id="output"></div>
    </div>
    <script src="exp5.js"></script>
</body>
</html>
