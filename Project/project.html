<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BookWorld</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-3">
    <a class="navbar-brand" href="#">📚 BookWorld</a>

    <div>
        <a class="text-white me-3" href="index.html">Home</a>

        <a class="text-white me-3" href="cart.html">
            Cart 🛒 <span id="cart-count">0</span>
        </a>

        <a class="text-white" href="#" id="contact-link">Contact</a>
    </div>
</nav>

<!-- HERO -->
<div class="text-center p-5 bg-light">
    <h1>Welcome to BookWorld</h1>
    <p>Find your next favorite book</p>
</div>

<!-- SEARCH -->
<div class="container mt-3">
    <input id="search" class="form-control" placeholder="Search books...">
</div>

<!-- BOOKS -->
<div class="container mt-4">
    <div class="row" id="book-container"></div>
</div>

<!-- BOOK MODAL -->
<div class="modal fade" id="bookModal">
    <div class="modal-dialog">
        <div class="modal-content p-3">

            <h4 id="modalTitle"></h4>
            <img id="modalImage" class="img-fluid mb-2">

            <p><b>Author:</b> <span id="modalAuthor"></span></p>
            <p><b>Price:</b> ₹<span id="modalPrice"></span></p>
            <p><b>Category:</b> <span id="modalCategory"></span></p>
            <p><b>Description:</b> <span id="modalDesc"></span></p>

            <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
    </div>
</div>

<!-- CONTACT MODAL -->
<div class="modal fade" id="contactModal">
    <div class="modal-dialog">
        <div class="modal-content p-3">

            <h4>Contact</h4>
            <p><b>Name:</b> Saransh Goel</p>
            <p><b>Email:</b> off.sg17@gmail.com</p>
            <p><b>Phone:</b> +91 123XX 678XX</p>

            <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
