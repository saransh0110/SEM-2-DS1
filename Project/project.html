<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookWorld</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand" href="#">
                📚 BookWorld
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="#">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Books</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1>Welcome to BookWorld</h1>
            <p>Discover your next favorite book</p>
            <button class="btn btn-warning">Browse Books</button>
        </div>
    </section>

    <!-- Search Box -->
    <div class="container mt-5">
        <input type="text" id="search" class="form-control" placeholder="Search books by title...">
    </div>

    <!-- Book Cards -->
    <div class="container mt-5">
        <div class="row" id="book-container"></div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-5">
        © 2026 BookWorld
    </footer>

    <!-- Book Details Modal -->
    <div class="modal fade" id="bookModal">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 id="modalTitle"></h5>

                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <p>
                        <strong>Author:</strong>
                        <span id="modalAuthor"></span>
                    </p>

                    <p>
                        <strong>Price:</strong>
                        ₹<span id="modalPrice"></span>
                    </p>

                    <p>
                        <strong>Category:</strong>
                        <span id="modalCategory"></span>
                    </p>

                    <p>
                        <strong>Description:</strong>
                        <span id="modalDesc"></span>
                    </p>

                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
